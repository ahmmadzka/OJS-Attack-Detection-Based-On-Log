# =========================
# OJS (default + IP access)
# =========================

server {
listen 80 default_server;
server_name _;

access_log /dev/stdout main;
error_log /dev/stderr warn;

location / {
    mirror /_mirror;
    mirror_request_body on;

    proxy_pass http://ojs:80;

    # Uncomment the following lines only if OJS must be accessed
    # from a frontend hosted on a different domain/origin.
    #
    # add_header Access-Control-Allow-Origin https://your-domain.com;
    # add_header Access-Control-Allow-Credentials true;
    # add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
    # add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port $server_port;

    # Uncomment the following line to forcing HTTPS in case of SSL termination at the load balancer
    #proxy_set_header X-Forwarded-Proto https;
    #proxy_set_header X-Forwarded-Port 443;
}

location = /_mirror {
    internal;

    proxy_pass http://extractor:8081;

    proxy_pass_request_body on;

    proxy_set_header Content-Length $content_length;
    proxy_set_header Content-Type $content_type;
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Original-Method $request_method;
    proxy_set_header X-Original-IP $remote_addr;
    proxy_set_header X-Request-ID $request_id;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Host $host;
}

}

