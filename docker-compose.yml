services:
  # nginx reverse proxy dan traffic mirror
  nginx:
    image: nginx:stable
    container_name: ojs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - ojs-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/mirror.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      ojs:
        condition: service_started
      extractor:
        condition: service_started

  # ojs
  ojs:
    build:
      context: ./ojs
    container_name: ojs-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:80"
    environment:
      OJS_CLI_INSTALL: "0"
      OJS_DB_HOST: postgres
      OJS_DB_DRIVER: pgsql
      OJS_DB_NAME: ${POSTGRES_DB}
      OJS_DB_USER: ${POSTGRES_USER}
      OJS_DB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ojs-files:/var/www/files
      - ojs-public:/var/www/html/public
      - ojs-plugins:/var/www/html/plugins
      - ./ojs/config.inc.php:/var/www/html/config.inc.php
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ojs-network

  # Database PostgreSQL
  postgres:
    image: postgres:15
    container_name: ojs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1 || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ojs-network

  # traffic extractor go/gin
  extractor:
    build:
      context: ./extractor
    container_name: traffic-extractor
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./extractor/requests.log:/app/requests.log
      - ./.env:/app/.env
    networks:
      - ojs-network

volumes:
  postgres-data:
  ojs-files:
  ojs-public:
  ojs-plugins:

networks:
  ojs-network:
    driver: bridge
